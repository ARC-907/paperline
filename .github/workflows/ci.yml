name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    name: ruff + pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          # System libs needed by pdf2image / pymupdf at import time on Linux
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends poppler-utils
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check system/ paperline_ui/ tests/

      - name: Ruff (format check)
        run: ruff format --check system/ paperline_ui/ tests/
        continue-on-error: true   # formatting drift is a warning, not a gate

      - name: Pytest
        run: pytest -ra

  pip-audit:
    name: pip-audit (advisory)
    runs-on: ubuntu-latest
    # Fail-soft initially: this job surfaces known-vulnerable dependencies
    # but does not gate merges yet. Promote to gating once the baseline is
    # clean and tracked.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Audit Python dependencies
        uses: pypa/gh-action-pip-audit@v1.0.8
        with:
          inputs: |
            requirements.txt
            pyproject.toml
